# Internal NTP server for your device fleet.
# Serves the node's already-correct system clock to your device subnet. NO server/pool lines =>
# no outbound NTP => opens nothing new to the internet. `-x` (Dockerfile) => chronyd never adjusts
# any clock (server only).
# NOTE: chrony does NOT support trailing inline comments on directive lines — keep comments on own lines.
port 12300
local stratum 10
allow all
driftfile /tmp/chrony.drift
pidfile /dev/null
